services:
  user-cohorts:
    build: .
    image: user-cohorts:latest
    container_name: user-cohorts
    network_mode: "container:prod-vpn"
    command: ["sleep", "infinity"]
    stdin_open: true
    tty: true
    volumes:
      - .:/app
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
